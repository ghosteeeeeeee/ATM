server {
    listen 127.0.0.1:54321;
    server_name _;
    root /var/www/hermes;

    # Hermes dashboard pages
    location = /trades.html { try_files /trades.html =404; }
    location = /signals.html { try_files /signals.html =404; }

    # Hermes data (separate from Tokyo data)
    location = /data/signals.json { alias /var/www/hermes/data/signals.json; }
    location = /data/trades.json  { alias /var/www/hermes/data/trades.json; }

    # Hermes logs
    location = /pipeline.log { alias /root/.hermes/logs/pipeline.log; }
    location = /errors.log { alias /root/.hermes/logs/errors.log; }

    # Git archives
    location = /git { return 301 /git/; }
    location /git/ {
        alias /var/www/git/;
        index index.html;
    }

    # Default: 404
    location / { return 404; }
}
