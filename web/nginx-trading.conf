server {
    listen 127.0.0.1:54321;
    server_name _;
    root /var/www/html;

    location = /trades.html {
        try_files /trades.html =404;
    }
    location = /trades_data.json {
        proxy_pass http://127.0.0.1:3457/api/trades;
        proxy_set_header Host $host;
    }
    location = /signals.html {
        try_files /signals.html =404;
    }
    location = /signals_data.json {
        proxy_pass http://127.0.0.1:3457/api/signals;
        proxy_set_header Host $host;
    }

    location = /hermes.zip {
        alias /var/www/html/hermes.zip;
        add_header Content-Disposition "attachment";
    }

    location = /git {
        return 301 /git/;
    }
    location /git/ {
        alias /var/www/git/;
        autoindex on;
        autoindex_format json;
        add_header Content-Type "application/json";
    }
    location = /git/hermes.zip {
        return 301 /git/hermes_20260328_182434_7d.zip;
    }

    location / {
        return 404;
    }
}
