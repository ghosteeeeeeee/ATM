<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hermes Trades</title>
    <meta http-equiv="refresh" content="60">
    <style>
        :root {
            --bg: #0a0a0f;
            --card-bg: #12121a;
            --border: #2a2a3a;
            --text: #e8e8ed;
            --text-dim: #8888a0;
            --green: #3fb950;
            --red: #f85149;
            --blue: #58a6ff;
            --purple: #bc8cff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'SF Pro', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 15px;
        }
        h1 {
            font-size: 1.8rem;
            color: var(--purple);
        }
        .refresh-info { color: var(--text-dim); font-size: 0.9rem; }
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 12px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px;
        }
        .stat-label { color: var(--text-dim); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
        .stat-value { font-size: 1.4rem; font-weight: 700; }
        .stat-value.green { color: var(--green); }
        .stat-value.red { color: var(--red); }
        .stat-value.blue { color: var(--blue); }
        .section { margin-bottom: 40px; }
        .section-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-dim);
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }
        .trades-list { display: flex; flex-direction: column; gap: 10px; }
        .trade {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .trade.long { border-left: 4px solid var(--green); }
        .trade.short { border-left: 4px solid var(--red); }
        .trade-main { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
        .trade-token { font-size: 1.2rem; font-weight: 700; }
        .trade-dir.long { color: var(--green); font-weight: 600; }
        .trade-dir.short { color: var(--red); font-weight: 600; }
        .trade-price { color: var(--text-dim); font-size: 0.85rem; }
        .trade-meta { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
        .trade-stat { text-align: right; }
        .trade-stat-label { color: var(--text-dim); font-size: 0.7rem; text-transform: uppercase; }
        .trade-stat-val { font-size: 0.95rem; font-weight: 600; }
        .trade-pnl { font-size: 1.1rem; font-weight: 700; }
        .trade-pnl.positive { color: var(--green); }
        .trade-pnl.negative { color: var(--red); }
        .trade-pnl.neutral { color: var(--text-dim); }
        .no-trades { color: var(--text-dim); font-style: italic; padding: 30px; text-align: center; background: var(--card-bg); border-radius: 10px; border: 1px dashed var(--border); }
        .badge {
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 600;
            text-transform: uppercase;
        }
        .badge.hermes { background: #1f2937; color: var(--purple); border: 1px solid var(--purple); }
        .badge.reason { background: #1f2937; color: var(--text-dim); border: 1px solid #374151; font-size: 0.65rem; }
        .none { color: var(--text-dim); font-style: italic; text-align: center; padding: 40px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Hermes Trades</h1>
        <div class="refresh-info">Auto-refreshes every 60s</div>
    </div>

    <div class="stats-row" id="stats"></div>

    <div class="section">
        <div class="section-title">Open Positions</div>
        <div class="trades-list" id="open-trades"></div>
    </div>

    <div class="section">
        <div class="section-title">Closed Positions</div>
        <div class="trades-list" id="closed-trades"></div>
    </div>

    <script>
        async function load() {
            try {
                const res = await fetch('/trades_data.json');
                const data = await res.json();

                const open = data.open || [];
                const closed = data.closed || [];
                const openCount = data.open_count || open.length;
                const closedCount = data.closed_count || closed.length;

                // Stats
                let totalPnl = 0, wins = 0, losses = 0;
                closed.forEach(t => {
                    const pnl = parseFloat(t.pnl_pct || 0);
                    totalPnl += pnl;
                    if (pnl > 0) wins++;
                    else if (pnl < 0) losses++;
                });
                const winRate = closedCount > 0 ? ((wins / closedCount) * 100).toFixed(0) : 0;

                document.getElementById('stats').innerHTML = `
                    <div class="stat-card">
                        <div class="stat-label">Open</div>
                        <div class="stat-value blue">${openCount}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Closed</div>
                        <div class="stat-value">${closedCount}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Win Rate</div>
                        <div class="stat-value ${winRate >= 50 ? 'green' : 'red'}">${winRate}%</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Total PnL</div>
                        <div class="stat-value ${totalPnl >= 0 ? 'green' : 'red'}">${totalPnl > 0 ? '+' : ''}${totalPnl.toFixed(2)}%</div>
                    </div>
                `;

                // Open trades
                if (open.length === 0) {
                    document.getElementById('open-trades').innerHTML = '<div class="no-trades">No open positions</div>';
                } else {
                    document.getElementById('open-trades').innerHTML = open.map(t => `
                        <div class="trade ${(t.direction || 'LONG').toLowerCase()}">
                            <div class="trade-main">
                                <span class="trade-token">${t.token || t.symbol || '?'}</span>
                                <span class="trade-dir ${(t.direction || 'LONG').toLowerCase()}">${t.direction || 'LONG'}</span>
                                <span class="trade-price">Entry: $${t.entry_price || '?'}</span>
                            </div>
                            <div class="trade-meta">
                                ${t.leverage ? `<span class="badge">${t.leverage}x</span>` : ''}
                                ${t.amount_usdt ? `<span class="trade-stat"><div class="trade-stat-label">Size</div><div class="trade-stat-val">$${t.amount_usdt}</div></span>` : ''}
                                ${t.pnl_pct !== undefined ? `<span class="trade-pnl neutral">${parseFloat(t.pnl_pct) >= 0 ? '+' : ''}${parseFloat(t.pnl_pct).toFixed(2)}%</span>` : ''}
                            </div>
                        </div>
                    `).join('');
                }

                // Closed trades
                if (closed.length === 0) {
                    document.getElementById('closed-trades').innerHTML = '<div class="no-trades">No closed positions</div>';
                } else {
                    document.getElementById('closed-trades').innerHTML = closed.map(t => {
                        const pnl = parseFloat(t.pnl_pct || 0);
                        return `
                        <div class="trade ${pnl >= 0 ? 'long' : 'short'}">
                            <div class="trade-main">
                                <span class="trade-token">${t.token || t.symbol || '?'}</span>
                                <span class="trade-dir ${(t.direction || 'LONG').toLowerCase()}">${t.direction || 'LONG'}</span>
                                <span class="trade-price">Entry: $${t.entry_price || '?'}</span>
                                ${t.exit_price ? `<span class="trade-price">Exit: $${t.exit_price}</span>` : ''}
                            </div>
                            <div class="trade-meta">
                                ${t.leverage ? `<span class="badge">${t.leverage}x</span>` : ''}
                                ${t.amount_usdt ? `<span class="trade-stat"><div class="trade-stat-label">Size</div><div class="trade-stat-val">$${t.amount_usdt}</div></span>` : ''}
                                ${t.close_reason ? `<span class="badge reason">${t.close_reason}</span>` : ''}
                                <span class="trade-pnl ${pnl > 0 ? 'positive' : pnl < 0 ? 'negative' : 'neutral'}">${pnl >= 0 ? '+' : ''}${pnl.toFixed(2)}%</span>
                            </div>
                        </div>`;
                    }).join('');
                }
            } catch(e) {
                document.getElementById('open-trades').innerHTML = '<div class="no-trades">Error: ' + e.message + '</div>';
            }
        }
        load();
    </script>
</body>
</html>
